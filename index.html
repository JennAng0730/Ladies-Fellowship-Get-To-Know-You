<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Selfie Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #fff5f7;
            --primary-pink: #ffb7ce;
            --dark-pink: #ff65a3;
            --accent-purple: #dcd3ff;
            --text-dark: #5c414d;
            --gold: #dfb15b;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 0);
            background-size: 24px 24px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .bingo-container {
            background: #ffffff;
            border: 8px solid var(--primary-pink);
            border-radius: 30px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(255, 101, 163, 0.15);
            position: relative;
            box-sizing: border-box;
        }

        /* Decorative flourishes inspired by the design */
        .bingo-container::before, .bingo-container::after {
            content: '🌸';
            position: absolute;
            font-size: 2rem;
        }
        .bingo-container::before { top: -15px; left: -15px; }
        .bingo-container::after { bottom: -15px; right: -15px; }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Fredoka', cursive;
            color: var(--dark-pink);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px var(--accent-purple);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 700;
            color: #7b626e;
            margin: 8px 0 15px 0;
        }

        /* Player Name Input */
        .player-box {
            background: var(--bg-color);
            border: 2px dashed var(--dark-pink);
            border-radius: 15px;
            padding: 10px 15px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .player-box label {
            font-weight: 700;
            color: var(--dark-pink);
        }

        .player-box input {
            border: none;
            background: transparent;
            border-bottom: 2px solid var(--primary-pink);
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            padding: 2px 5px;
            outline: none;
            width: 150px;
            text-align: center;
        }

        /* 3x2 Grid Setup */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .bingo-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 2rem; }
        }

        /* Individual Card Item Design */
        .bingo-card {
            background: #fff;
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            min-height: 250px;
            overflow: hidden;
        }

        .bingo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(223, 177, 91, 0.3);
        }

        /* Badge Number */
        .badge {
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', cursive;
            font-size: 0.9rem;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .prompt-text {
            font-weight: 700;
            font-size: 1.05rem;
            margin-top: 20px;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        /* Dynamic detail field per card description */
        .detail-input {
            width: 90%;
            border: 1px solid var(--primary-pink);
            border-radius: 8px;
            padding: 5px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
        }

        /* Selfie Target Upload Area */
        .selfie-slot {
            width: 90px;
            height: 90px;
            border: 2px dashed var(--primary-pink);
            border-radius: 12px;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        .selfie-slot:hover {
            background-color: #ffe6ee;
        }

        .selfie-slot span {
            font-size: 0.75rem;
            color: var(--dark-pink);
            font-weight: 700;
            text-align: center;
            padding: 5px;
        }

        .selfie-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* File inputs hidden away nicely */
        .file-input {
            display: none;
        }

        /* Active completed state style */
        .bingo-card.completed {
            background-color: #f7f3ff;
            border-color: var(--dark-pink);
        }

        .bingo-card.completed::after {
            content: '✨';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="bingo-container">
    <header>
        <h1>🌸 Human Selfie Bingo 🌸</h1>
        <div class="subtitle">Type name & take a selfie to tag an option!</div>
        
        <div class="player-box">
            <label for="playerName">PLAYER: </label>
            <input type="text" id="playerName" placeholder="Type name here...">
        </div>
    </header>

    <div class="bingo-grid">
        <div class="bingo-card" id="card-1">
            <div class="badge">1</div>
            <div class="prompt-text">Has a pet 🐶🐱</div>
            <input type="text" class="detail-input" placeholder="Pet & Owner Name">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-2">
            <div class="badge">2</div>
            <div class="prompt-text">Traveled Internationally ✈️</div>
            <input type="text" class="detail-input" placeholder="Visited Country">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-3">
            <div class="badge">3</div>
            <div class="prompt-text">Watches K-Dramas 📺💖</div>
            <input type="text" class="detail-input" placeholder="Favorite Drama Title">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-4">
            <div class="badge">4</div>
            <div class="prompt-text">Likes Trying New Things 🎨🌶️</div>
            <input type="text" class="detail-input" placeholder="Recently Tried Activity">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-5">
            <div class="badge">5</div>
            <div class="prompt-text">Talks to Themselves 💭⭐</div>
            <input type="text" class="detail-input" placeholder="Caught Talking To [Myself]">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-6">
            <div class="badge">6</div>
            <div class="prompt-text">Has Gotten Lost Before 🗺️❓</div>
            <input type="text" class="detail-input" placeholder="Got Lost In [Place]">
            <label class="selfie-slot">
                <span>+ ADD SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>
    </div>
</div>

<script>
    // Handles reading the file dynamically and setting it into the placeholder slot
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const slot = input.parentElement;
            const card = slot.parentElement;

            reader.onload = function(e) {
                // Check if an image already exists inside this slot, if so remove it
                const existingImg = slot.querySelector('img');
                if (existingImg) {
                    existingImg.remove();
                }

                // Create and insert the image asset element
                const img = document.createElement('img');
                img.src = e.target.result;
                slot.appendChild(img);

                // Add "completed" class variant to give visual flare to the bingo grid card
                card.classList.add('completed');
            }

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
