<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Selfie Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #fff5f7;
            --primary-pink: #ffb7ce;
            --dark-pink: #ff65a3;
            --accent-purple: #dcd3ff;
            --text-dark: #5c414d;
            --gold: #dfb15b;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 0);
            background-size: 16px 16px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .bingo-container {
            background: #ffffff;
            border: 5px solid var(--primary-pink);
            border-radius: 20px;
            padding: 15px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(255, 101, 163, 0.15);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Fredoka', cursive;
            color: var(--dark-pink);
            font-size: 1.7rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px var(--accent-purple);
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 700;
            color: #7b626e;
            margin: 2px 0 6px 0;
        }

        .player-box {
            background: var(--bg-color);
            border: 1.5px dashed var(--dark-pink);
            border-radius: 8px;
            padding: 4px 12px;
            display: inline-block;
        }

        .player-box label {
            font-weight: 700;
            color: var(--dark-pink);
            font-size: 0.85rem;
        }

        .player-box input {
            border: none;
            background: transparent;
            border-bottom: 2px solid var(--primary-pink);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
            width: 120px;
            text-align: center;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .bingo-card {
            background: #fff;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 10px 4px 8px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            height: 165px; 
        }

        .badge {
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', cursive;
            font-size: 0.7rem;
            position: absolute;
            top: 4px;
            left: 4px;
        }

        .prompt-text {
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 10px;
            margin-bottom: 4px;
            line-height: 1.15;
        }

        .detail-input {
            width: 92%;
            border: 1px solid var(--primary-pink);
            border-radius: 6px;
            padding: 4px 2px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 6px;
            outline: none;
            box-sizing: border-box;
            background-color: #fff;
        }

        /* Standard Native Trigger Block */
        .selfie-slot {
            width: 100%;
            max-width: 60px;
            height: 48px;
            background-color: var(--bg-color);
            border: 1.5px dashed var(--dark-pink);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        /* Standard text styled nicely */
        .upload-btn-text {
            font-size: 0.65rem;
            color: var(--dark-pink);
            font-weight: 700;
            text-align: center;
            display: block;
            width: 100%;
        }

        /* Standard native button style but visually clean and fully unblocked */
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            opacity: 0.01; /* Keeps it natively alive to Android touch systems */
            cursor: pointer;
            display: block !important;
        }

        .selfie-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 6px;
        }

        .bingo-card.completed {
            background-color: #f7f3ff;
            border-color: var(--dark-pink);
        }

        .bingo-card.completed::after {
            content: '✨';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.75rem;
        }

        @media (max-width: 360px) {
            .prompt-text { font-size: 0.75rem; }
            .bingo-card { height: 150px; }
            .selfie-slot { height: 42px; }
        }
    </style>
</head>
<body>

<div class="bingo-container">
    <header>
        <h1>🌸 Human Selfie Bingo 🌸</h1>
        <div class="subtitle">Type details & take a selfie together!</div>
        
        <div class="player-box">
            <label for="playerName">PLAYER: </label>
            <input type="text" id="playerName" placeholder="Type name...">
        </div>
    </header>

    <div class="bingo-grid">
        <div class="bingo-card" id="card-1">
            <div class="badge">1</div>
            <div class="prompt-text">Has a pet 🐶</div>
            <input type="text" class="detail-input" placeholder="Name & Pet">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>

        <div class="bingo-card" id="card-2">
            <div class="badge">2</div>
            <div class="prompt-text">Traveled Abroad ✈️</div>
            <input type="text" class="detail-input" placeholder="Where?">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>

        <div class="bingo-card" id="card-3">
            <div class="badge">3</div>
            <div class="prompt-text">K-Dramas 📺</div>
            <input type="text" class="detail-input" placeholder="Favorite?">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>

        <div class="bingo-card" id="card-4">
            <div class="badge">4</div>
            <div class="prompt-text">Likes New Things 🎨</div>
            <input type="text" class="detail-input" placeholder="What activity?">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>

        <div class="bingo-card" id="card-5">
            <div class="badge">5</div>
            <div class="prompt-text">Talks to Self 💭</div>
            <input type="text" class="detail-input" placeholder="What was said?">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>

        <div class="bingo-card" id="card-6">
            <div class="badge">6</div>
            <div class="prompt-text">Gotten Lost 🗺️</div>
            <input type="text" class="detail-input" placeholder="Where at?">
            <div class="selfie-slot">
                <span class="upload-btn-text">+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </div>
        </div>
    </div>
</div>

<script>
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const slot = input.parentElement;
            const card = slot.parentElement;

            reader.onload = function(e) {
                const existingImg = slot.querySelector('img');
                if (existingImg) {
                    existingImg.remove();
                }

                const img = document.createElement('img');
                img.src = e.target.result;
                slot.appendChild(img);

                card.classList.add('completed');
            }

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
