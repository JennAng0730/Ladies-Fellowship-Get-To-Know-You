<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Selfie Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #fff5f7;
            --primary-pink: #ffb7ce;
            --dark-pink: #ff65a3;
            --accent-purple: #dcd3ff;
            --text-dark: #5c414d;
            --gold: #dfb15b;
        }

        body {
            margin: 0;
            padding: 8px;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 0);
            background-size: 16px 16px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Guaranteed no scrolling */
        }

        .bingo-container {
            background: #ffffff;
            border: 5px solid var(--primary-pink);
            border-radius: 20px;
            padding: 10px 15px;
            max-width: 500px; /* Perfect sizing for desktop & mobile */
            width: 100%;
            height: 96vh; /* Fills the screen height exactly */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(255, 101, 163, 0.15);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        h1 {
            font-family: 'Fredoka', cursive;
            color: var(--dark-pink);
            font-size: 1.6rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px var(--accent-purple);
        }

        .subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: #7b626e;
            margin: 2px 0 4px 0;
        }

        .player-box {
            background: var(--bg-color);
            border: 2px dashed var(--dark-pink);
            border-radius: 10px;
            padding: 2px 10px;
            display: inline-block;
        }

        .player-box label {
            font-weight: 700;
            color: var(--dark-pink);
            font-size: 0.8rem;
        }

        .player-box input {
            border: none;
            background: transparent;
            border-bottom: 2px solid var(--primary-pink);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
            width: 110px;
            text-align: center;
        }

        /* Fixed 3x2 Grid across ALL screens */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            flex-grow: 1;
            margin-top: 5px;
        }

        /* Individual Card Item Design scaled to fit */
        .bingo-card {
            background: #fff;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            height: 100%; /* Dynamically stretches to fit perfectly */
        }

        .badge {
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', cursive;
            font-size: 0.7rem;
            position: absolute;
            top: 4px;
            left: 4px;
        }

        .prompt-text {
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 10px;
            margin-bottom: 4px;
            line-height: 1.1;
        }

        .detail-input {
            width: 95%;
            border: 1px solid var(--primary-pink);
            border-radius: 4px;
            padding: 3px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 4px;
            outline: none;
        }

        /* Ultra Compact Selfie Slot to safeguard screen space */
        .selfie-slot {
            width: 100%;
            max-width: 65px;
            height: 55px;
            border: 1.5px dashed var(--primary-pink);
            border-radius: 8px;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .selfie-slot span {
            font-size: 0.6rem;
            color: var(--dark-pink);
            font-weight: 700;
        }

        .selfie-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .file-input {
            display: none;
        }

        .bingo-card.completed {
            background-color: #f7f3ff;
            border-color: var(--dark-pink);
        }

        .bingo-card.completed::after {
            content: '✨';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.8rem;
        }

        /* Micro scaling for very tiny phones */
        @media (max-height: 570px) {
            h1 { font-size: 1.3rem; }
            .prompt-text { font-size: 0.7rem; }
            .selfie-slot { height: 45px; }
        }
    </style>
</head>
<body>

<div class="bingo-container">
    <header>
        <h1>🌸 Human Selfie Bingo 🌸</h1>
        <div class="subtitle">Type name & take a selfie to tag an option!</div>
        
        <div class="player-box">
            <label for="playerName">PLAYER: </label>
            <input type="text" id="playerName" placeholder="Type name...">
        </div>
    </header>

    <div class="bingo-grid">
        <div class="bingo-card" id="card-1">
            <div class="badge">1</div>
            <div class="prompt-text">Has a pet 🐶</div>
            <input type="text" class="detail-input" placeholder="Pet & Owner Name">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-2">
            <div class="badge">2</div>
            <div class="prompt-text">Traveled Abroad ✈️</div>
            <input type="text" class="detail-input" placeholder="Visited Country">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-3">
            <div class="badge">3</div>
            <div class="prompt-text">K-Dramas 📺</div>
            <input type="text" class="detail-input" placeholder="Favorite Title">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-4">
            <div class="badge">4</div>
            <div class="prompt-text">Likes New Things 🎨</div>
            <input type="text" class="detail-input" placeholder="Tried Activity">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-5">
            <div class="badge">5</div>
            <div class="prompt-text">Talks to Self 💭</div>
            <input type="text" class="detail-input" placeholder="Caught Saying...">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>

        <div class="bingo-card" id="card-6">
            <div class="badge">6</div>
            <div class="prompt-text">Gotten Lost Before 🗺️</div>
            <input type="text" class="detail-input" placeholder="Lost In [Place]">
            <label class="selfie-slot">
                <span>+ SELFIE</span>
                <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
            </label>
        </div>
    </div>
</div>

<script>
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const slot = input.parentElement;
            const card = slot.parentElement;

            reader.onload = function(e) {
                const existingImg = slot.querySelector('img');
                if (existingImg) {
                    existingImg.remove();
                }

                const img = document.createElement('img');
                img.src = e.target.result;
                slot.appendChild(img);

                card.classList.add('completed');
            }

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
