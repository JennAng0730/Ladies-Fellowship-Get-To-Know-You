<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Selfie Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #fff5f7;
            --primary-pink: #ffb7ce;
            --dark-pink: #ff65a3;
            --accent-purple: #dcd3ff;
            --text-dark: #5c414d;
            --gold: #dfb15b;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 0);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Prevents page scrolling completely */
        }

        .bingo-container {
            background: #ffffff;
            border: 6px solid var(--primary-pink);
            border-radius: 24px;
            padding: 15px 20px;
            max-width: 800px;
            width: 100%;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 101, 163, 0.15);
            position: relative;
            box-sizing: border-box;
        }

        .bingo-container::before, .bingo-container::after {
            content: '🌸';
            position: absolute;
            font-size: 1.5rem;
        }
        .bingo-container::before { top: -12px; left: -12px; }
        .bingo-container::after { bottom: -12px; right: -12px; }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Fredoka', cursive;
            color: var(--dark-pink);
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px var(--accent-purple);
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: #7b626e;
            margin: 4px 0 8px 0;
        }

        .player-box {
            background: var(--bg-color);
            border: 2px dashed var(--dark-pink);
            border-radius: 12px;
            padding: 4px 12px;
            display: inline-block;
        }

        .player-box label {
            font-weight: 700;
            color: var(--dark-pink);
            font-size: 0.9rem;
        }

        .player-box input {
            border: none;
            background: transparent;
            border-bottom: 2px solid var(--primary-pink);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
            padding: 2px;
            outline: none;
            width: 130px;
            text-align: center;
        }

        /* 3x2 Grid Optimized for Screen Height */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        /* Individual Card Item Design */
        .bingo-card {
            background: #fff;
            border: 3px solid var(--gold);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transition: transform 0.2s;
            box-sizing: border-box;
            height: 210px; /* Reduced fixed height to fit screen */
        }

        .badge {
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', cursive;
            font-size: 0.8rem;
            position: absolute;
            top: 8px;
            left: 8px;
        }

        .prompt-text {
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 12px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .detail-input {
            width: 90%;
            border: 1px solid var(--primary-pink);
            border-radius: 6px;
            padding: 4px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 8px;
            outline: none;
        }

        /* Compact Selfie Target Upload Area */
        .selfie-slot {
            width: 75px;
            height: 75px;
            border: 2px dashed var(--primary-pink);
            border-radius: 10px;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .selfie-slot span {
            font-size: 0.65rem;
            color: var(--dark-pink);
            font-weight: 700;
            text-align: center;
        }

        .selfie-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .file-input {
            display: none;
        }

        .bingo-card.completed {
            background-color: #f7f3ff;
            border-color: var(--dark-pink);
        }

        .bingo-card.completed::after {
            content: '✨';
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 1rem;
        }

        /* Responsive scaling for small smartphone layouts */
        @media (max-width: 650px) {
            body { overflow: auto; height: auto; }
            .bingo-container { max-height: none; }
            .bingo-grid { grid-template-columns: 1fr 1fr; }
            .bingo-card { height: 190px; }
        }
    </style>
</head>
<body>
