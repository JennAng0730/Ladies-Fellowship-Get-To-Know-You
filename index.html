<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ladies' Fellowship Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        :root {
            --bg-color: #fff5f7;
            --primary-pink: #ffb7ce;
            --dark-pink: #ff65a3;
            --accent-purple: #dcd3ff;
            --text-dark: #5c414d;
            --gold: #dfb15b;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 0);
            background-size: 16px 16px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .bingo-container {
            background: #ffffff;
            border: 5px solid var(--primary-pink);
            border-radius: 20px;
            padding: 15px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(255, 101, 163, 0.15);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        /* The main grand header style */
        .event-title {
            font-family: 'Fredoka', cursive;
            color: var(--dark-pink);
            font-size: 1.9rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px var(--accent-purple);
        }

        /* Sub-heading game title style */
        .game-title {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #7b626e;
            letter-spacing: 0.5px;
            margin: 4px 0 2px 0;
        }

        .event-date {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--dark-pink);
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 500;
            color: #7b626e;
            margin: 4px 0 6px 0;
        }

        .player-box {
            background: var(--bg-color);
            border: 1.5px dashed var(--dark-pink);
            border-radius: 8px;
            padding: 4px 12px;
            display: inline-block;
            margin-top: 4px;
        }

        .player-box label {
            font-weight: 700;
            color: var(--dark-pink);
            font-size: 0.85rem;
        }

        .player-box input {
            border: none;
            background: transparent;
            border-bottom: 2px solid var(--primary-pink);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
            width: 120px;
            text-align: center;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .bingo-card {
            background: #fff;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 10px 4px 8px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            height: 175px; 
        }

        .badge {
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', cursive;
            font-size: 0.7rem;
            position: absolute;
            top: 4px;
            left: 4px;
        }

        .prompt-text {
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 12px;
            margin-bottom: 4px;
            line-height: 1.15;
        }

        .detail-input {
            width: 92%;
            border: 1px solid var(--primary-pink);
            border-radius: 6px;
            padding: 4px 2px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 6px;
            outline: none;
            box-sizing: border-box;
            background-color: #fff;
        }

        .selfie-btn {
            background-color: var(--bg-color);
            border: 1.5px solid var(--dark-pink);
            border-radius: 20px;
            padding: 5px 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--dark-pink);
            cursor: pointer;
            width: 85%;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 2px 4px rgba(255, 101, 163, 0.1);
            transition: background 0.2s;
        }

        .selfie-btn:active {
            background-color: var(--primary-pink);
            color: white;
        }

        .preview-box {
            width: 45px;
            height: 45px;
            border: 1px dashed var(--gold);
            border-radius: 6px;
            margin-top: 4px;
            display: none;
            overflow: hidden;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bingo-card.completed {
            background-color: #f7f3ff;
            border-color: var(--dark-pink);
        }

        .bingo-card.completed::after {
            content: '✨';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.75rem;
        }

        @media (max-width: 360px) {
            .event-title { font-size: 1.6rem; }
            .prompt-text { font-size: 0.75rem; }
            .bingo-card { height: 150px; }
            .selfie-btn { height: 38px; padding: 3px 4px; }
        }
    </style>
</head>
<body>

<div class="bingo-container">
    <header>
        <div class="event-title">🌸 Ladies' Fellowship 🌸</div>
        <div class="game-title">Human Selfie Bingo</div>
        <div class="event-date">May 22, 2026</div>
        
        <div class="subtitle">Type details & take a selfie together!</div>
        
        <div class="player-box">
            <label for="playerName">PLAYER: </label>
            <input type="text" id="playerName" placeholder="Type name...">
        </div>
    </header>

    <div class="bingo-grid">
        <div class="bingo-card" id="card-1">
            <div class="badge">1</div>
            <div class="prompt-text">Has a pet 🐶</div>
            <input type="text" class="detail-input" placeholder="Name & Pet">
            <button class="selfie-btn" onclick="triggerUpload(1)">📸 +SELFIE</button>
            <input type="file" id="file-1" accept="image/*" style="display:none;" onchange="handleImage(this, 1)">
            <div class="preview-box" id="preview-1"></div>
        </div>

        <div class="bingo-card" id="card-2">
            <div class="badge">2</div>
            <div class="prompt-text">Traveled Abroad ✈️</div>
            <input type="text" class="detail-input" placeholder="Where?">
            <button class="selfie-btn" onclick="triggerUpload(2)">📸 +SELFIE</button>
            <input type="file" id="file-2" accept="image/*" style="display:none;" onchange="handleImage(this, 2)">
            <div class="preview-box" id="preview-2"></div>
        </div>

        <div class="bingo-card" id="card-3">
            <div class="badge">3</div>
            <div class="prompt-text">K-Dramas 📺</div>
            <input type="text" class="detail-input" placeholder="Favorite?">
            <button class="selfie-btn" onclick="triggerUpload(3)">📸 +SELFIE</button>
            <input type="file" id="file-3" accept="image/*" style="display:none;" onchange="handleImage(this, 3)">
            <div class="preview-box" id="preview-3"></div>
        </div>

        <div class="bingo-card" id="card-4">
            <div class="badge">4</div>
            <div class="prompt-text">Likes New Things 🎨</div>
            <input type="text" class="detail-input" placeholder="What activity?">
            <button class="selfie-btn" onclick="triggerUpload(4)">📸 +SELFIE</button>
            <input type="file" id="file-4" accept="image/*" style="display:none;" onchange="handleImage(this, 4)">
            <div class="preview-box" id="preview-4"></div>
        </div>

        <div class="bingo-card" id="card-5">
            <div class="badge">5</div>
            <div class="prompt-text">Talks to Self 💭</div>
            <input type="text" class="detail-input" placeholder="What was said?">
            <button class="selfie-btn" onclick="triggerUpload(5)">📸 +SELFIE</button>
            <input type="file" id="file-5" accept="image/*" style="display:none;" onchange="handleImage(this, 5)">
            <div class="preview-box" id="preview-5"></div>
        </div>

        <div class="bingo-card" id="card-6">
            <div class="badge">6</div>
            <div class="prompt-text">Gotten Lost 🗺️</div>
            <input type="text" class="detail-input" placeholder="Where at?">
            <button class="selfie-btn" onclick="triggerUpload(6)">📸 +SELFIE</button>
            <input type="file" id="file-6" accept="image/*" style="display:none;" onchange="handleImage(this, 6)">
            <div class="preview-box" id="preview-6"></div>
        </div>
    </div>
</div>

<script>
    function triggerUpload(id) {
        document.getElementById('file-' + id).click();
    }

    function handleImage(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const previewBox = document.getElementById('preview-' + id);
            const card = document.getElementById('card-' + id);
            const btn = card.querySelector('.selfie-btn');

            reader.onload = function(e) {
                previewBox.innerHTML = '';
                const img = document.createElement('img');
                img.src = e.target.result;
                previewBox.appendChild(img);
                
                previewBox.style.display = 'block';
                btn.textContent = '🔄 CHANGE';
                card.classList.add('completed');
            }

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
